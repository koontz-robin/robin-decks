<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIT × Rev.io Consolidated Deck</title>
<style>
  :root {
    --rev-blue:#0057ff;
    --rev-cyan:#00c2ff;
    --navy:#071426;
    --line:rgba(255,255,255,.14);
    --muted:rgba(255,255,255,.64);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; overflow:hidden; }
  body {
    font-family:"Segoe UI", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background:var(--navy);
    color:#fff;
  }
  .deck-shell {
    height:100vh;
    display:grid;
    grid-template-rows:66px 1fr;
  }
  .tabs {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
    padding:0 22px;
    background:rgba(7,20,38,.98);
    border-bottom:1px solid var(--line);
    box-shadow:0 12px 30px rgba(0,0,0,.22);
    z-index:5;
  }
  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:190px;
  }
  .brand img {
    height:34px;
    width:auto;
    background:#fff;
    border-radius:6px;
    padding:6px 9px;
  }
  .brand-text {
    display:grid;
    gap:1px;
  }
  .brand-title {
    font-size:13px;
    font-weight:900;
    letter-spacing:.2px;
    white-space:nowrap;
  }
  .brand-sub {
    color:var(--muted);
    font-size:11px;
    font-weight:700;
  }
  .tab-list {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    flex:1;
  }
  .tab {
    appearance:none;
    border:1px solid transparent;
    border-radius:999px;
    background:transparent;
    color:rgba(255,255,255,.68);
    min-height:38px;
    padding:0 16px;
    cursor:pointer;
    font:inherit;
    font-size:13px;
    font-weight:850;
    white-space:nowrap;
  }
  .tab:hover { color:#fff; background:rgba(255,255,255,.08); }
  .tab.active {
    color:#fff;
    background:linear-gradient(135deg,var(--rev-blue),var(--rev-cyan));
    box-shadow:0 10px 24px rgba(0,87,255,.28);
  }
  .open-link {
    color:#a9ecff;
    text-decoration:none;
    font-size:12px;
    font-weight:800;
    min-width:118px;
    text-align:right;
  }
  .open-link:hover { color:#fff; }
  .frame-wrap { position:relative; min-height:0; background:#f4f7fb; }
  iframe {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    background:#fff;
  }
  .loading {
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    color:#172033;
    font-weight:800;
    background:#f4f7fb;
    z-index:0;
  }
  @media (max-width:820px) {
    .deck-shell { grid-template-rows:auto 1fr; }
    .tabs {
      align-items:stretch;
      flex-direction:column;
      padding:12px;
      gap:10px;
    }
    .brand, .open-link { min-width:0; }
    .brand { justify-content:center; }
    .open-link { text-align:center; }
    .tab-list {
      width:100%;
      justify-content:flex-start;
      overflow-x:auto;
      padding-bottom:2px;
    }
  }
</style>
</head>
<body>
<main class="deck-shell">
  <nav class="tabs" aria-label="AVIT consolidated deck tabs">
    <div class="brand">
      <img src="avit-assets/avit-logo-red-analysis.webp" alt="AVIT logo">
      <div class="brand-text">
        <div class="brand-title">AVIT × Rev.io</div>
        <div class="brand-sub">Consolidated deck</div>
      </div>
    </div>
    <div class="tab-list" role="tablist">
      <button class="tab active" type="button" role="tab" aria-selected="true" data-tab="evaluations">Evaluations Summary</button>
      <button class="tab" type="button" role="tab" aria-selected="false" data-tab="onsite">Onsite Meeting Recap</button>
      <button class="tab" type="button" role="tab" aria-selected="false" data-tab="implementation">Implementation Plan</button>
    </div>
    <a class="open-link" id="openCurrent" href="avit-roi-deck.html?v=20260604-mobile-qr" target="_blank" rel="noopener">Open current tab</a>
  </nav>
  <section class="frame-wrap" aria-live="polite">
    <div class="loading">Loading deck...</div>
    <iframe id="deckFrame" title="Evaluations Summary" src="avit-roi-deck.html?v=20260604-mobile-qr"></iframe>
  </section>
</main>
<script>
  const decks = {
    evaluations: {
      title: 'Evaluations Summary',
      src: 'avit-roi-deck.html?v=20260604-mobile-qr'
    },
    onsite: {
      title: 'Onsite Meeting Recap',
      src: 'avit-june4-transcript-analysis.html?v=20260605-priority-quotes-2'
    },
    implementation: {
      title: 'Implementation Plan',
      src: 'avit-implementation-dashboard.html?v=20260616-remove-nav-title#why-revio'
    }
  };

  const frame = document.getElementById('deckFrame');
  const openCurrent = document.getElementById('openCurrent');
  const tabs = [...document.querySelectorAll('.tab')];

  function activate(tabName, pushHash = true) {
    const deck = decks[tabName] || decks.evaluations;
    tabs.forEach(tab => {
      const active = tab.dataset.tab === tabName;
      tab.classList.toggle('active', active);
      tab.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    frame.title = deck.title;
    frame.src = deck.src;
    openCurrent.href = deck.src;
    if (pushHash) history.replaceState(null, '', `#${tabName}`);
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => activate(tab.dataset.tab));
  });

  const initial = location.hash.replace('#', '');
  if (initial && decks[initial]) activate(initial, false);
</script>
</body>
</html>
