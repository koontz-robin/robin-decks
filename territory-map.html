<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rev.io Sales Territory Map</title>
<style>
  :root {
    --green: #00ff88;
    --cyan: #00e5ff;
    --bg: #020408;
    --surface: #060d14;
    --border: #0a2a1a;
    --border2: #0d1f2d;
    --text: #c8f0dc;
    --muted: #2a5a3a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,monospace; background:var(--bg); color:var(--text); min-height:100vh; }

  body::before {
    content:'';
    position:fixed; top:0; left:0; right:0; bottom:0;
    background-image:
      linear-gradient(rgba(0,255,136,0.22) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.22) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  .header {
    position:relative; z-index:1;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px;
    background:rgba(6,13,20,0.95);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(8px);
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo { height:36px; width:auto; }
  .header-title {
    font-size:18px; font-weight:700; letter-spacing:1px;
    color:var(--green); text-transform:uppercase;
  }
  .header-sub { font-size:11px; color:var(--muted); letter-spacing:2px; margin-top:2px; }
  .badge {
    font-size:11px; padding:4px 10px;
    border:1px solid var(--green); border-radius:20px;
    color:var(--green); letter-spacing:1px;
    background:rgba(0,255,136,0.05);
  }

  .container {
    position:relative; z-index:1;
    max-width:1200px; margin:0 auto; padding:32px 24px;
  }

  .section-title {
    font-size:13px; font-weight:700; letter-spacing:2px;
    color:var(--green); text-transform:uppercase;
    margin-bottom:16px;
    display:flex; align-items:center; gap:8px;
  }
  .section-title::before {
    content:''; display:inline-block;
    width:3px; height:16px;
    background:var(--green); border-radius:2px;
  }

  .map-card {
    background:rgba(6,13,20,0.9);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    margin-bottom:32px;
  }
  .map-card-header {
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    font-size:12px; letter-spacing:1px; color:var(--muted);
    display:flex; align-items:center; justify-content:space-between;
  }
  .map-card-header span { color:var(--green); font-weight:600; }
  .map-img {
    width:100%; display:block;
    cursor:pointer;
    transition:opacity 0.2s;
  }
  .map-img:hover { opacity:0.9; }

  .tabs {
    display:flex; gap:8px; margin-bottom:24px;
  }
  .tab {
    padding:8px 20px; border-radius:6px;
    font-size:12px; font-weight:600; letter-spacing:1px;
    cursor:pointer; text-transform:uppercase;
    border:1px solid var(--border);
    color:var(--muted); background:transparent;
    transition:all 0.2s;
  }
  .tab.active {
    border-color:var(--green); color:var(--green);
    background:rgba(0,255,136,0.07);
  }

  .footer {
    position:relative; z-index:1;
    text-align:center; padding:24px;
    font-size:11px; color:var(--muted);
    border-top:1px solid var(--border);
    margin-top:16px;
    letter-spacing:1px;
  }

  /* Lightbox */
  .lightbox {
    display:none; position:fixed; z-index:100;
    top:0; left:0; right:0; bottom:0;
    background:rgba(2,4,8,0.95);
    align-items:center; justify-content:center;
    cursor:zoom-out;
  }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:95vw; max-height:92vh; border-radius:8px; border:1px solid var(--border); }
  .lightbox-close {
    position:fixed; top:20px; right:28px;
    font-size:28px; color:var(--green);
    cursor:pointer; z-index:101;
    background:rgba(6,13,20,0.9); border-radius:50%;
    width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img class="logo" src="https://www.rev.io/hs-fs/hubfs/Theme%2C%20Identity%2C%20Brand%2C%20Internal%202024/Rev.io%20Brand%20Resources/Rev.io%20Logos%20and%20Glyphs/logo-revio-white.png?width=150&height=39" alt="Rev.io">
    <div>
      <div class="header-title">Sales Territory Map</div>
      <div class="header-sub">MSP SALES TEAM · Q2 2026</div>
    </div>

  <div class="badge">INTERNAL USE ONLY</div>
</div>

<script>
function showMap(which, btn) {
  document.getElementById('map-updated').style.display = which === 'updated' ? 'block' : 'none';
  document.getElementById('map-original').style.display = which === 'original' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });
</script>
